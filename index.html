<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascenseur Horreur - iwened-lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="snd-ambiance" src="ambiance.mp3" loop></audio>
    <audio id="snd-jumpscare" src="jumpscare.mp3"></audio>
    <audio id="snd-success" src="success.mp3"></audio>
    <audio id="snd-doors" src="doors.mp3"></audio>

    <div id="game-container">
        <div id="floor-display">000</div>
        <div id="elevator-view">
            <div id="room-content">
                <img id="monster-overlay" src="monstre.png" alt="Monstre">
                <p id="room-text">Clique sur monter pour commencer...</p>
            </div>
            <div id="door-left" class="door"></div>
            <div id="door-right" class="door"></div>
        </div>
        <div id="controls">
            <button class="btn" onclick="changeFloor(1)">▲ MONTER</button>
            <button class="btn" onclick="changeFloor(-1)">▼ DESCENDRE</button>
            <button class="btn action" onclick="toggleDoors()">🚪 OUVRIR</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
