<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Ascenseur Horreur - Le Jeu de Mémoire de iwened-lab</title>

    <meta name="description" content="Arriverez-vous à l'étage 100 ? Un jeu d'ascenseur terrifiant par iwened-lab.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="floor-display">000</div>
        <div id="elevator-view">
            <div id="room-content">
                <div id="monster-overlay">👹</div>
                <p id="room-text">L'ascenseur attend...</p>
            </div>
            <div id="door-left" class="door"></div>
            <div id="door-right" class="door"></div>
        </div>
        <div id="controls">
            <button class="btn" onclick="changeFloor(1)">▲ MONTER</button>
            <button class="btn" onclick="changeFloor(-1)">▼ DESCENDRE</button>
            <button class="btn action" onclick="toggleDoors()">🚪 OUVRIR L'ÉTAGE</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
